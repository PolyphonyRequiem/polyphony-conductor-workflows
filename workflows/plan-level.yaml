# plan-level — Recursive planning core for any plannable work item level.
#
# Replaces plan-design.yaml, plan-child.yaml, plan-issue.yaml, and
# task-decomposition.yaml with a single type-agnostic workflow. Type
# knowledge is injected at runtime via type_loader — no type-name literals
# appear in this file.
#
# Self-recursion: child_router discovers plannable children and invokes
# this workflow per child with depth+1 (Task 2681).
#
# Invariants:
#   Pre:  work_item_id exists in ADO and is plannable per process-config.yaml.
#   Post: Approved plan exists and child work items are seeded.

workflow:
  name: plan-level
  description: >-
    Recursive planning core. Plans a single hierarchy level by loading
    type-specific context, running the architect agent with review pipeline,
    and seeding child work items from the approved plan.
  version: "1.0.0"
  entry_point: depth_guard

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID to plan
    intent:
      type: string
      required: false
      default: resume
      description: "new | redo | resume"
    user_plan_path:
      type: string
      required: false
      default: ""
      description: Path to user-authored plan document (refine, not discard)
    depth:
      type: number
      required: false
      default: 0
      description: Current recursion depth (0 = root level)
    max_depth:
      type: number
      required: false
      default: 6
      description: Maximum recursion depth before requiring human approval

tools:
  - twig
  - gh
  - filesystem

agents:
  # ── Depth guard ──────────────────────────────────────────────────────────
  #
  # Validates that the current recursion depth has not exceeded max_depth.
  # Prevents runaway recursion by gating deeper levels behind human approval.
  #
  # Invariants:
  #   Pre:  depth and max_depth are non-negative integers.
  #   Post: output.allowed is true (depth < max_depth) or false (depth >= max_depth).
  - name: depth_guard
    type: script
    description: Validate recursion depth against max_depth
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/depth-guard.ps1"
      - "-Depth"
      - "{{ workflow.input.depth }}"
      - "-MaxDepth"
      - "{{ workflow.input.max_depth }}"
    routes:
      - to: guidance_loader
        when: "{{ depth_guard.output.allowed == true }}"
      - to: depth_exceeded_gate
        when: "{{ depth_guard.output.allowed == false }}"

  # ── Guidance loader ────────────────────────────────────────────────────
  #
  # Loads repo-specific agent guidance markdown from .conductor/agent-guidance/
  # via load-agent-guidance.ps1. Outputs a JSON role map (keyed by filename
  # without extension, e.g. "architect", "reviewer"). The architect,
  # technical_reviewer, and readability_reviewer agents consume their
  # respective role keys via Jinja2 conditionals so prompts degrade
  # gracefully when no guidance files exist.
  #
  # Invariants:
  #   Pre:  depth_guard.output.allowed == true.
  #   Post: output is a JSON object mapping role names to guidance content
  #         (empty object {} when no agent-guidance directory exists).
  - name: guidance_loader
    type: script
    description: Load agent guidance markdown files for planning agent prompts
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/load-agent-guidance.ps1"
    routes:
      - to: type_loader

  # ── Depth exceeded gate ──────────────────────────────────────────────────
  #
  # Human notification that recursion depth has been exceeded. The user
  # acknowledges and the workflow ends for this branch (P6).
  #
  # Invariants:
  #   Pre:  depth_guard.output.allowed == false.
  #   Post: User has acknowledged the depth limit; workflow ends.
  - name: depth_exceeded_gate
    type: human_gate
    prompt: |
      ## ⚠️ Recursion Depth Exceeded

      Planning for work item **{{ workflow.input.work_item_id }}** has reached
      depth **{{ workflow.input.depth }}** (max: **{{ workflow.input.max_depth }}**).

      This typically means the hierarchy is deeper than expected. Consider
      restructuring the work item tree or increasing `max_depth` if the depth
      is intentional.

      ---

      Choose an action:
      - **Acknowledge** — stop planning this branch (children will not be planned)
    options:
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end

  # ── Type loader ──────────────────────────────────────────────────────────
  #
  # Loads type-specific context from .conductor/work-item-types/ for the
  # given work item. Outputs the type name, semantic definition, plan
  # template, and decomposition guidance — all consumed by the architect.
  #
  # Invariants:
  #   Pre:  work_item_id exists in ADO; .conductor/work-item-types/ is configured.
  #   Post: output contains { type, definition, template, decomposition_guidance }.
  - name: type_loader
    type: script
    description: Load type-specific context from .conductor/work-item-types/
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/load-type-context.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: route_check
        when: "{{ type_loader.exit_code == 0 }}"
      - to: type_loader_error_gate
        when: "{{ type_loader.exit_code != 0 }}"

  # ── Type loader error gate ───────────────────────────────────────────────
  #
  # Human notification that type context loading failed. The user acknowledges
  # and the workflow ends for this item.
  #
  # Invariants:
  #   Pre:  type_loader has exited with a non-zero exit code.
  #   Post: User has acknowledged the error; workflow ends.
  - name: type_loader_error_gate
    type: human_gate
    prompt: |
      ## ⚠️ Type Context Load Failed

      Planning for work item **{{ workflow.input.work_item_id }}** cannot continue
      because the type context could not be loaded.

      **Error:** {{ type_loader.output.error | default("Unknown error — check that .conductor/work-item-types/ is configured and the work item exists in ADO.") }}

      ---

      Choose an action:
      - **Abort** — cancel planning for this work item
    options:
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Route check ──────────────────────────────────────────────────────────
  #
  # Determines the current planning phase via Polyphony route. Enables
  # re-entry (P3) by detecting whether the item needs planning, needs
  # seeding, or is already planned.
  #
  # Invariants:
  #   Pre:  type_loader has completed successfully.
  #   Post: output.phase is one of: needs_planning, needs_seeding, already_planned.
  - name: route_check
    type: script
    description: Detect planning phase via Polyphony route
    command: polyphony
    args:
      - "route"
      - "--work-item"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: architect
        when: "{{ route_check.output.phase == 'needs_planning' }}"
      - to: seeder
        when: "{{ route_check.output.phase == 'needs_seeding' }}"
      - to: $end
        when: "{{ route_check.output.phase == 'already_planned' }}"

  # ── Architect agent ──────────────────────────────────────────────────────
  #
  # Core planning agent. Creates or refines a plan for the work item using
  # type-specific definitions, templates, and decomposition guidance injected
  # by type_loader. When user_plan_path is non-empty, refines the user plan
  # rather than starting from scratch. Raises open questions as structured
  # output rather than silently overriding user design decisions.
  #
  # Invariants:
  #   Pre:  route_check.output.phase == 'needs_planning'; type_loader outputs available.
  #   Post: output.plan contains the plan artifact; output.open_questions may be non-empty.
  - name: architect
    type: agent
    model: claude-opus-4-1m
    context_window: 1000000
    description: Create or refine a plan using type-specific context and decomposition guidance
    tools:
      - twig
      - gh
      - filesystem
    prompt: !file ../prompts/architect-plan-level.md
    routes:
      - to: open_questions_gate
        when: "{{ architect.output.open_questions | length > 0 }}"
      - to: review_group
        when: "{{ architect.output.open_questions | length == 0 }}"

  # ── Open questions gate ──────────────────────────────────────────────────
  #
  # Surfaces the architect's open questions to the user. The user can
  # provide answers (looping back to architect for revision) or proceed
  # to review without answering (P6).
  #
  # Invariants:
  #   Pre:  architect.output.open_questions is a non-empty array.
  #   Post: User has answered questions or chosen to proceed.
  - name: open_questions_gate
    type: human_gate
    prompt: |
      ## 🤔 Open Questions — Work Item {{ workflow.input.work_item_id }}

      The architect has identified questions that need your input before
      finalizing the plan:

      {% for question in architect.output.open_questions %}
      ### {{ loop.index }}. {{ question.topic }}

      {{ question.detail }}

      {% endfor %}

      ---

      Choose an action:
      - **Answer** — provide answers and revise the plan
      - **Proceed** — continue to review without answering
    options:
      - label: "💬 Answer"
        value: answer
        route: architect
        prompt_for: answers
      - label: "⏩ Proceed to Review"
        value: proceed
        route: review_group

  # ── Review group (parallel) ──────────────────────────────────────────────
  #
  # Runs technical and readability reviews in parallel. Both reviewers
  # score the plan 0-100 independently. Uses fail_fast to abort early
  # if either reviewer encounters an error.
  #
  # Invariants:
  #   Pre:  architect.output.plan is a complete plan artifact.
  #   Post: Both reviewers have produced scores and feedback.
  - name: review_group
    parallel:
      - technical_reviewer
      - readability_reviewer
    failure_mode: fail_fast
    routes:
      - to: review_router

  # ── Technical reviewer ───────────────────────────────────────────────────
  #
  # Reviews the architect's plan for technical soundness, feasibility,
  # and alignment with the type's decomposition guidance. Scores 0-100.
  #
  # Invariants:
  #   Pre:  architect.output.plan exists.
  #   Post: output.score (0-100) and output.feedback (string) are set.
  - name: technical_reviewer
    type: agent
    model: claude-sonnet-4-20250514
    description: Review plan for technical soundness and feasibility
    prompt: |
      You are a technical reviewer for an SDLC planning workflow.

      ## Your Mission

      Review the following plan for technical soundness, feasibility, and
      alignment with the decomposition guidance. Score the plan 0-100.

      ## Context

      - **Work item:** {{ workflow.input.work_item_id }}
      - **Type definition:** {{ type_loader.output.definition }}
      - **Decomposition guidance:** {{ type_loader.output.decomposition_guidance }}

      ## Plan to Review

      {{ architect.output.plan }}

      ## Scoring Criteria

      | Criterion | Weight | Description |
      |-----------|--------|-------------|
      | Feasibility | 30% | Can the plan be implemented as described? |
      | Completeness | 25% | Does the plan cover all aspects of the work item? |
      | Decomposition | 25% | Are child items well-scoped and appropriately sized? |
      | Alignment | 20% | Does the plan follow type-specific guidance? |

      {% if guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.reviewer }}
      {% endif %}

      ## Output

      Return a JSON object:
      ```json
      {
        "score": 0,
        "feedback": "Detailed feedback on the plan",
        "strengths": ["..."],
        "weaknesses": ["..."]
      }
      ```

  # ── Readability reviewer ─────────────────────────────────────────────────
  #
  # Reviews the plan for clarity, completeness of documentation, and
  # readability by both humans and downstream agents. Scores 0-100.
  #
  # Invariants:
  #   Pre:  architect.output.plan exists.
  #   Post: output.score (0-100) and output.feedback (string) are set.
  - name: readability_reviewer
    type: agent
    model: claude-sonnet-4-20250514
    description: Review plan for clarity and completeness
    prompt: |
      You are a readability reviewer for an SDLC planning workflow.

      ## Your Mission

      Review the following plan for clarity, completeness, and readability.
      Score the plan 0-100.

      ## Context

      - **Work item:** {{ workflow.input.work_item_id }}
      - **Plan template:** {{ type_loader.output.template }}

      ## Plan to Review

      {{ architect.output.plan }}

      ## Scoring Criteria

      | Criterion | Weight | Description |
      |-----------|--------|-------------|
      | Clarity | 30% | Is the plan easy to understand? |
      | Structure | 25% | Does it follow the template structure? |
      | Completeness | 25% | Are acceptance criteria, scope, and goals clear? |
      | Actionability | 20% | Can downstream agents and humans act on it? |

      {% if guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.reviewer }}
      {% endif %}

      ## Output

      Return a JSON object:
      ```json
      {
        "score": 0,
        "feedback": "Detailed feedback on the plan",
        "strengths": ["..."],
        "weaknesses": ["..."]
      }
      ```

  # ── Review router ────────────────────────────────────────────────────────
  #
  # Evaluates combined review scores and routes accordingly. Scores below
  # 90 loop back to the architect for revision; scores >= 90 proceed to
  # human approval.
  #
  # Invariants:
  #   Pre:  technical_reviewer and readability_reviewer have produced scores.
  #   Post: Routes to architect (revise) or plan_approval based on scores.
  - name: review_router
    type: script
    description: Route based on combined review scores
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $techScore = {{ technical_reviewer.output.score }};
        $readScore = {{ readability_reviewer.output.score }};
        $avg = [math]::Floor(($techScore + $readScore) / 2);
        $pass = $avg -ge 90;
        @{ average_score = $avg; technical_score = $techScore; readability_score = $readScore; passed = $pass } | ConvertTo-Json
    routes:
      - to: architect
        when: "{{ review_router.output.passed == false }}"
      - to: plan_approval
        when: "{{ review_router.output.passed == true }}"

  # ── Plan approval gate ───────────────────────────────────────────────────
  #
  # Human decision point for the final plan. Presents the plan with review
  # scores and a link to the plan artifact. The user can approve (proceed
  # to seeding), revise (loop back to architect), or reject (end) (P6, P13).
  #
  # Invariants:
  #   Pre:  review_router.output.passed == true.
  #   Post: User has approved, requested revision, or rejected the plan.
  - name: plan_approval
    type: human_gate
    prompt: |
      ## 📋 Plan Approval — Work Item {{ workflow.input.work_item_id }}

      The architect's plan has passed review with an average score of
      **{{ review_router.output.average_score }}**/100.

      ### Review Scores

      | Reviewer | Score | Feedback |
      |----------|-------|----------|
      | Technical | {{ review_router.output.technical_score }} | {{ technical_reviewer.output.feedback }} |
      | Readability | {{ review_router.output.readability_score }} | {{ readability_reviewer.output.feedback }} |

      ### Plan Summary

      {{ architect.output.plan }}

      ---

      Choose an action:
      - **Approve** — accept the plan and proceed to seed child work items
      - **Revise** — send the plan back to the architect with feedback
      - **Reject** — discard the plan and end planning for this item
    options:
      - label: "✅ Approve"
        value: approved
        route: seeder
      - label: "🔄 Revise"
        value: revise
        route: architect
        prompt_for: revision_feedback
      - label: "❌ Reject"
        value: reject
        route: $end

  # ── Seeder agent ─────────────────────────────────────────────────────────
  #
  # Creates child work items from the approved plan using the twig CLI.
  # Uses type information from type_loader to determine appropriate child
  # types. Routes to child_router for recursive planning of plannable children.
  #
  # Invariants:
  #   Pre:  Plan is approved; type_loader outputs available.
  #   Post: Child work items are created in ADO; output.seeded_count is set.
  - name: seeder
    type: agent
    model: claude-sonnet-4-20250514
    description: Create child work items from the approved plan
    tools:
      - twig
    prompt: !file ../prompts/seeder-plan-level.md
    routes:
      - to: child_router

  # ── Child router ─────────────────────────────────────────────────────────
  #
  # Discovers plannable children of the current work item using polyphony
  # hierarchy. Filters by 'plannable' capability to determine which children
  # need their own planning sub-workflow invocation.
  #
  # Invariants:
  #   Pre:  Seeder has completed; child work items may exist.
  #   Post: output.has_plannable_children is set; plannable_children array populated.
  - name: child_router
    type: script
    description: Discover plannable children for recursive planning
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/child-router.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: plan_children_group
        when: "{{ child_router.output.has_plannable_children == true }}"
      - to: $end
        when: "{{ child_router.output.has_plannable_children == false }}"

  # ── Plan children group (for_each) ──────────────────────────────────────
  #
  # Self-recursion: invokes plan-level.yaml for each plannable child with
  # depth+1. This enables any hierarchy depth to be planned with a single
  # workflow file. Conductor enforces max_depth to prevent runaway recursion.
  #
  # Invariants:
  #   Pre:  child_router.output.has_plannable_children == true.
  #   Post: Each plannable child has been planned (or depth-limited).
  - name: plan_children_group
    for_each:
      source: "{{ child_router.output.plannable_children }}"
      as: child
      max_concurrent: 3
      failure_mode: continue_on_error
      agent:
        name: plan_child
        type: workflow
        workflow: ./plan-level.yaml
        max_depth: 6
        input_mapping:
          work_item_id: "{{ child.id }}"
          depth: "{{ workflow.input.depth + 1 }}"
          max_depth: "{{ workflow.input.max_depth }}"
          intent: "{{ workflow.input.intent }}"
          user_plan_path: ""
    routes:
      - to: plan_children_summary_gate
        when: "{{ plan_children_group.failed_count > 0 }}"
      - to: $end
        when: "{{ plan_children_group.failed_count == 0 }}"

  # ── Plan children summary gate ───────────────────────────────────────────
  #
  # Fires only when one or more child planning sub-workflows failed. Surfaces
  # failures to the user so they can decide whether to abort or continue.
  #
  # Invariants:
  #   Pre:  plan_children_group has completed with at least one failure.
  #   Post: User has acknowledged the partial failure; workflow ends.
  - name: plan_children_summary_gate
    type: human_gate
    prompt: |
      ## ⚠️ Child Planning Partial Failure

      Planning for work item **{{ workflow.input.work_item_id }}** completed with errors.

      - **Succeeded:** {{ plan_children_group.succeeded_count }}
      - **Failed:** {{ plan_children_group.failed_count }}

      Some child work items were not planned. Review the failures and re-run
      planning for the affected items if needed.

      ---

      Choose an action:
      - **Acknowledge** — accept the partial result and continue
    options:
      - label: "✅ Acknowledge"
        value: acknowledge
        route: $end
