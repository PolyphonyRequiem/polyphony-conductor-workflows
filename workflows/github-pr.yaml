# github-pr — GitHub PR lifecycle: review, fix loop, and merge.
#
# Platform-specific PR sub-workflow for GitHub. Uses an Opus 1M reviewer
# agent for thorough code review, a Sonnet fixer agent for addressing
# feedback in a loop (capped at 10 iterations per P7), and a merger
# agent to complete the merge.
#
# Interface contract: Accepts the same inputs and produces the same outputs
# as ado-pr.yaml (pr_number, branch_name, target_branch, review_policy →
# merged, pr_url). This enables the implementation workflow to select the
# platform sub-workflow based on process-config.yaml's platform field.
#
# Invariants:
#   Pre:  PR exists (created by pr_submit); platform is 'github'.
#   Post: PR is reviewed, fixed (if needed), and merged. Outputs merged
#         and pr_url for downstream consumers.

workflow:
  name: github-pr
  description: >-
    GitHub PR lifecycle. Reviews the PR with Opus 1M, fixes issues via
    Sonnet in a loop (max 10 iterations), and merges when approved.
  version: "1.0.0"
  entry_point: pr_reviewer

  limits:
    max_iterations: 50

  input:
    pr_number:
      type: number
      required: true
      description: Pull request number (GitHub PR ID)
    branch_name:
      type: string
      required: true
      description: Source branch name for the PR
    target_branch:
      type: string
      required: true
      description: Target branch the PR merges into
    review_policy:
      type: string
      required: false
      default: "auto"
      description: "Review policy: auto (agent-reviewed) or manual (human gate)"

tools:
  - gh
  - filesystem

output:
  # Lowercase-coerce so the parent workflow's _maybe_parse_json sees
  # 'true'/'false' rather than the capital 'True'/'False' Jinja produces
  # for Python booleans (see conductor-mechanics M7).
  merged: "{{ (pr_merger.output.merged | default(false)) | string | lower }}"
  pr_url: "{{ pr_merger.output.pr_url | default('') }}"

agents:
  # ── PR reviewer ────────────────────────────────────────────────────────
  #
  # Reviews the PR using Opus 1M for thorough, large-context code review.
  # Fetches the PR diff via gh api, evaluates code quality, correctness,
  # and alignment with requirements. Routes to merger if approved, or to
  # the review counter for iteration tracking before fixes.
  #
  # Invariants:
  #   Pre:  PR exists and is open on GitHub.
  #   Post: output.verdict is 'approved' or 'changes_requested';
  #         output.feedback contains detailed review comments.
  - name: pr_reviewer
    type: agent
    model: gpt-5
    context_window: 1000000
    description: Review PR for correctness, quality, and requirement alignment
    tools:
      - gh
      - filesystem
    prompt: |
      You are the PR reviewer for the twig SDLC workflow.

      ## Your Mission

      Perform a thorough code review of PR #{{ workflow.input.pr_number }} on
      the `{{ workflow.input.branch_name }}` branch targeting
      `{{ workflow.input.target_branch }}`.

      ## Instructions

      1. **Fetch the PR diff** — Use `gh pr diff {{ workflow.input.pr_number }}`
         to see all changes.

      2. **Read the PR description** — Use `gh pr view {{ workflow.input.pr_number }}`
         to understand the intent and linked work items.

      3. **Review the changes** for:
         - **Correctness** — Does the code do what it claims?
         - **Quality** — Is the code clean, idiomatic, and maintainable?
         - **Tests** — Are changes adequately tested?
         - **Regressions** — Could these changes break existing behavior?
         - **Security** — Any security concerns (secrets, injection, etc.)?

      4. **Post review comments** — Use `gh api` to submit a PR review with
         your findings:
         ```
         gh api repos/{owner}/{repo}/pulls/{{ workflow.input.pr_number }}/reviews \
           --method POST \
           -f event="APPROVE" \
           -f body="Review comments here"
         ```
         Use event `APPROVE` if the PR is ready to merge, or
         `REQUEST_CHANGES` if issues need fixing.

      ## Output

      Return a JSON object:
      ```json
      {
        "verdict": "approved | changes_requested",
        "feedback": "Detailed review summary",
        "issues": ["List of specific issues if changes_requested"],
        "severity": "critical | major | minor"
      }
      ```

      ## Decision Criteria

      - **Approve** if the code is correct, well-tested, and safe to merge
      - **Request changes** for bugs, missing tests, security issues, or
        broken requirements
      - Do NOT request changes for style preferences or minor formatting
    output:
      verdict:
        type: string
        description: "Either 'approved' or 'changes_requested'"
      feedback:
        type: string
        description: Detailed review summary
      issues:
        type: array
        description: Specific issues if changes_requested (empty array if approved)
        items:
          type: string
      severity:
        type: string
        description: "One of 'critical', 'major', 'minor'"
    routes:
      - to: pr_merger
        when: "{{ pr_reviewer.output.verdict == 'approved' }}"
      - to: review_counter
        when: "{{ pr_reviewer.output.verdict == 'changes_requested' }}"
      # Catch-all: any unrecognized verdict (model hallucination, missing
      # field) is treated as changes_requested so the loop can recover via
      # the iteration counter rather than failing with "no matching route".
      - to: review_counter

  # ── Review iteration counter ───────────────────────────────────────────
  #
  # Tracks the number of review → fix iterations. Uses a counter file
  # scoped to the PR number to persist state across loop iterations.
  # Enforces the max 10 iteration cap per P7 (fail honestly, don't
  # auto-approve). Routes to fixer if under limit, or to human gate
  # if limit reached.
  #
  # Invariants:
  #   Pre:  pr_reviewer.output.verdict == 'changes_requested'.
  #   Post: output.iteration is the current count (1-based);
  #         output.under_limit indicates whether fixes may continue.
  - name: review_counter
    type: script
    description: Track review-fix iteration count (max 10 per P7)
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-pr-review-count-{{ workflow.input.pr_number }}"
        if (Test-Path $counterFile) {
            $count = [int](Get-Content $counterFile -Raw) + 1
        } else {
            $count = 1
        }
        Set-Content $counterFile $count
        @{ iteration = $count; under_limit = ($count -le 10) } | ConvertTo-Json
    routes:
      - to: pr_fixer
        when: "{{ review_counter.output.under_limit == true }}"
      - to: pr_fix_exhausted_gate
        when: "{{ review_counter.output.under_limit == false }}"
      # Catch-all: defensive against under_limit being missing/malformed.
      - to: pr_fix_exhausted_gate

  # ── PR fixer ───────────────────────────────────────────────────────────
  #
  # Addresses review feedback using Sonnet. Reads the reviewer's issues,
  # makes targeted code fixes, and pushes updated commits. Routes back
  # to pr_reviewer for re-review.
  #
  # Invariants:
  #   Pre:  pr_reviewer.output.verdict == 'changes_requested';
  #         review_counter.output.under_limit == true.
  #   Post: Fixes are committed and pushed to the PR branch.
  - name: pr_fixer
    type: agent
    model: gpt-4o
    description: Address PR review feedback with targeted code fixes
    tools:
      - gh
      - filesystem
    prompt: |
      You are the PR fixer for the twig SDLC workflow.

      ## Your Mission

      Address the review feedback for PR #{{ workflow.input.pr_number }} on
      the `{{ workflow.input.branch_name }}` branch.

      ## Context

      - **PR number:** {{ workflow.input.pr_number }}
      - **Branch:** {{ workflow.input.branch_name }}
      - **Review iteration:** {{ review_counter.output.iteration }} of 10
      - **Reviewer feedback:** {{ pr_reviewer.output.feedback }}
      - **Issues to fix:**
      {% for issue in pr_reviewer.output.issues %}
        - {{ issue }}
      {% endfor %}

      ## Instructions

      1. **Read the review comments** — Use `gh pr view {{ workflow.input.pr_number }}`
         and `gh api` to fetch detailed review comments and inline suggestions.

      2. **Fix each issue** — For each issue identified by the reviewer:
         - Read the relevant source files
         - Make the targeted fix
         - Verify the fix doesn't introduce regressions

      3. **Run tests** — Ensure the build passes and tests succeed after fixes.

      4. **Commit and push** — Commit fixes with a descriptive message and push.

         Stage **only** the files you modified for this fix — never use
         `git add -A`, `git add .`, or `git add --all`. The working tree may
         contain unrelated dirty files from concurrent human work or earlier
         workflow iterations; sweeping them in pollutes the commit, breaks
         AB# traceability, and creates phantom changes in the PR.

         ```
         git add <path1> <path2>   # explicit paths, one per modified file
         git commit -m "fix: address PR review feedback (iteration {{ review_counter.output.iteration }})"
         git push
         ```

      ## Output

      Return a JSON object:
      ```json
      {
        "fixes_applied": ["Description of each fix"],
        "files_modified": ["List of modified files"],
        "tests_passed": true
      }
      ```

      ## Constraints

      - Fix ONLY the issues identified by the reviewer
      - Do NOT refactor code beyond what's needed for the fix
      - Do NOT change unrelated files
      - Every fix must be tested
    routes:
      - to: pr_reviewer

  # ── Fix exhaustion gate ────────────────────────────────────────────────
  #
  # Human decision point when the review-fix loop has reached the maximum
  # iteration cap (10). Per P7, the workflow does NOT auto-approve — it
  # surfaces the failure honestly and lets the human decide. Options:
  # force-merge (override), continue fixing (extend cap), or abort (P6).
  #
  # Invariants:
  #   Pre:  review_counter.output.iteration > 10.
  #   Post: Human has chosen to force-merge, continue, or abort.
  - name: pr_fix_exhausted_gate
    type: human_gate
    prompt: |
      ## ⚠️ PR Fix Loop Exhausted — PR #{{ workflow.input.pr_number }}

      The review → fix loop for PR **#{{ workflow.input.pr_number }}** has
      reached the maximum of **10 iterations** without achieving approval.

      ### PR Details

      | Field | Value |
      |-------|-------|
      | PR Number | `{{ workflow.input.pr_number }}` |
      | Branch | `{{ workflow.input.branch_name }}` |
      | Target | `{{ workflow.input.target_branch }}` |
      | Iterations | {{ review_counter.output.iteration }} |

      ### Latest Review Feedback

      {{ pr_reviewer.output.feedback }}

      ### Remaining Issues

      {% for issue in pr_reviewer.output.issues %}
      - {{ issue }}
      {% endfor %}

      ---

      The automated fix cycle has not resolved all review issues after
      **{{ review_counter.output.iteration }}** attempts.

      Choose an action:
      - **Force Merge** — merge the PR despite unresolved issues
      - **Continue** — reset the counter and try 10 more fix iterations
      - **Abort** — close the PR and stop the workflow
    options:
      - label: "⚡ Force Merge"
        value: force_merge
        route: pr_merger
      - label: "🔄 Continue"
        value: continue
        route: review_counter_reset
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── Review counter reset ───────────────────────────────────────────────
  #
  # Resets the iteration counter when the human chooses to continue
  # fixing after exhaustion. Routes back to the fixer to resume the
  # review-fix loop for another 10 iterations.
  #
  # Invariants:
  #   Pre:  Human chose 'continue' at pr_fix_exhausted_gate.
  #   Post: Counter file is reset to 0; loop resumes with fresh budget.
  - name: review_counter_reset
    type: script
    description: Reset review-fix iteration counter for continued fixing
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - |
        $counterFile = Join-Path ([System.IO.Path]::GetTempPath()) "conductor-pr-review-count-{{ workflow.input.pr_number }}"
        Set-Content $counterFile 0
        @{ iteration = 0; reset = $true } | ConvertTo-Json
    routes:
      - to: pr_fixer

  # ── PR merger ──────────────────────────────────────────────────────────
  #
  # Merges the approved PR using gh pr merge. Performs squash merge by
  # default for a clean history. Records the merge result and PR URL
  # for downstream consumers (scope_closer in implement-pg.yaml).
  #
  # Invariants:
  #   Pre:  pr_reviewer.output.verdict == 'approved', OR human chose
  #         'force_merge' at pr_fix_exhausted_gate.
  #   Post: PR is merged; output.merged and output.pr_url are set.
  - name: pr_merger
    type: agent
    model: gpt-4o
    description: Merge the approved PR via gh pr merge
    tools:
      - gh
    prompt: |
      You are the PR merger for the twig SDLC workflow.

      ## Your Mission

      Merge PR #{{ workflow.input.pr_number }} on the
      `{{ workflow.input.branch_name }}` branch into
      `{{ workflow.input.target_branch }}`.

      ## Instructions

      1. **Verify the PR is mergeable** — Use `gh pr view {{ workflow.input.pr_number }}`
         to confirm the PR status, check status, and merge readiness.

      2. **Merge the PR** — Use squash merge for a clean history:
         ```
         gh pr merge {{ workflow.input.pr_number }} --squash --delete-branch
         ```

      3. **Record the result** — Capture the merge status and PR URL.

      ## Output

      Return a JSON object:
      ```json
      {
        "merged": true,
        "pr_url": "https://github.com/{owner}/{repo}/pull/{{ workflow.input.pr_number }}",
        "merge_method": "squash",
        "error": ""
      }
      ```

      If the merge fails, set `merged` to `false` and include the error
      message in the `error` field.

      ## Constraints

      - Use squash merge unless the PR description specifies otherwise
      - Delete the source branch after merge (--delete-branch)
      - If merge fails due to conflicts, report the error — do NOT force-merge
    output:
      merged:
        type: boolean
        description: True if the PR merged successfully, false otherwise
      pr_url:
        type: string
        description: Full URL of the merged PR
      merge_method:
        type: string
        description: "Merge method used (e.g. 'squash', 'merge', 'rebase')"
      error:
        type: string
        description: Empty string on success, otherwise the error message
    routes:
      - to: $end
