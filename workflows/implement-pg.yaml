# implement-pg — Single PG lifecycle: task loop → PR creation → merge → scope close.
#
# Implements all tasks in a single Processing Group (PG), then creates and
# merges a PG-level PR via the platform-specific PR sub-workflow (github-pr
# or ado-pr). After the PR merges, scope-closer.ps1 transitions completed
# items to Done in ADO.
#
# Invoked by polyphony-implement.yaml via for_each for each pending PG.
#
# Invariants:
#   Pre:  PG work items exist in ADO; feature branch exists.
#   Post: All PG tasks are implemented, reviewed, and merged via PR.

workflow:
  name: implement-pg
  description: >-
    Single PG lifecycle. Creates a PG branch, iterates tasks through the
    coder → reviewer loop, checks dependency gates, runs issue-level review,
    and triggers platform-specific PR creation and merge.
  version: "1.0.0"
  entry_point: pg_router

  limits:
    # Implement-pg runs a task loop (router -> coder -> reviewer ->
    # completer -> back to router) potentially many times per PG, then a
    # PR lifecycle sub-workflow. Default 10 is far too low. See
    # conductor-mechanics M9.
    max_iterations: 200

  input:
    work_item_id:
      type: number
      required: true
      description: ADO work item ID of the parent (Issue-level) item for this PG
    pg_number:
      type: number
      required: true
      description: Processing Group number (e.g., 1, 2, 3)
    work_item_ids:
      type: array
      required: true
      description: Array of task work item IDs in this PG
    branch_name:
      type: string
      required: true
      description: PG branch name (e.g., feature/1234-pg-1)
    feature_branch:
      type: string
      required: true
      description: Parent feature branch that this PG branch targets
    platform:
      type: string
      required: false
      default: github
      description: "PR platform: github | ado"

tools:
  - twig
  - gh
  - filesystem

output:
  # Workflow-scope output is rendered at end-of-run. Per M7, capital
  # "True"/"False" is NOT coerced by _maybe_parse_json -- pipe through
  # `| string | lower` so the parent receives a real bool. Per M3,
  # under StrictUndefined we must guard `scope_closer is defined` because
  # several routes (pr_router action='all_complete', pr_lifecycle merged=
  # false, dependency_gate reassign, user_acceptance abort) reach $end
  # without running scope_closer.
  merged: "{% if scope_closer is defined %}{{ (scope_closer.output.exit_code == 0) | string | lower }}{% else %}false{% endif %}"
  pr_url: "{% if pr_submit is defined %}{{ pr_submit.output.pr_url | default('') }}{% else %}{% endif %}"

agents:
  # ── PG router ──────────────────────────────────────────────────────────
  #
  # Determines the current PG action via pg-router.ps1. Routes to branch
  # creation, task loop, PR submission, or end depending on PG state.
  # Enables re-entry (P3) by detecting current state rather than assuming
  # a fresh start.
  #
  # Invariants:
  #   Pre:  work_item_id and pg_number are valid.
  #   Post: output.action is one of: create_branch, implement_tasks, submit_pr, all_complete.
  - name: pg_router
    type: script
    description: Determine current PG action via pg-router.ps1
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/pg-router.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-PgNumber"
      - "{{ workflow.input.pg_number }}"
    routes:
      - to: branch_manager
        when: "{{ pg_router.output.action == 'create_branch' }}"
      - to: guidance_loader
        when: "{{ pg_router.output.action == 'implement_tasks' }}"
      - to: pr_submit
        when: "{{ pg_router.output.action == 'submit_pr' }}"
      - to: $end
        when: "{{ pg_router.output.action == 'all_complete' }}"
      # Catch-all per M4: if pg-router.ps1 emits an unknown action, fail
      # safely to $end rather than raise `No matching route found`.
      - to: $end

  # ── Branch manager ────────────────────────────────────────────────────
  #
  # Creates and checks out the PG branch from the feature branch. Uses
  # git to create the branch if it doesn't exist, or checks it out if
  # it already does (re-entry safe per P3).
  #
  # Invariants:
  #   Pre:  pg_router.output.action == 'create_branch'.
  #   Post: PG branch is checked out and ready for work.
  - name: branch_manager
    type: script
    description: Create or checkout the PG branch from the feature branch
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $branch = '{{ workflow.input.branch_name }}';
        $feature = '{{ workflow.input.feature_branch }}';
        $exists = git rev-parse --verify "refs/heads/$branch" 2>$null;
        if ($LASTEXITCODE -ne 0) {
          git checkout -b $branch $feature;
        } else {
          git checkout $branch;
        }
        if ($LASTEXITCODE -ne 0) { exit 1 }
        @{ branch = $branch; created = ($null -eq $exists) } | ConvertTo-Json
    routes:
      - to: guidance_loader

  # ── Guidance loader ────────────────────────────────────────────────────
  #
  # Loads repo-specific agent guidance markdown from .conductor/agent-guidance/
  # via load-agent-guidance.ps1. Outputs a JSON role map (keyed by filename
  # without extension, e.g. "coder", "reviewer"). The coder and task_reviewer
  # agents consume their respective role keys via Jinja2 conditionals so
  # prompts degrade gracefully when no guidance files exist.
  #
  # Invariants:
  #   Pre:  PG branch is checked out.
  #   Post: output is a JSON object mapping role names to guidance content
  #         (empty object {} when no agent-guidance directory exists).
  - name: guidance_loader
    type: script
    description: Load agent guidance markdown files for coder and reviewer prompts
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/load-agent-guidance.ps1"
    routes:
      - to: task_router

  # ── Task router ────────────────────────────────────────────────────────
  #
  # Determines the next task to implement within this PG via task-router.ps1.
  # Routes to coder for implementation or to dependency_check when all tasks
  # in the PG are complete.
  #
  # Invariants:
  #   Pre:  PG branch is checked out; work_item_ids are valid task IDs.
  #   Post: output.action is implement_task or all_tasks_done; output.task_id set if implementing.
  - name: task_router
    type: script
    description: Route to next implementable task within this PG
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/task-router.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-PgNumber"
      - "{{ workflow.input.pg_number }}"
    routes:
      - to: coder
        when: "{{ task_router.output.action == 'implement_task' }}"
      - to: dependency_check
        when: "{{ task_router.output.action == 'all_tasks_done' }}"
      # Catch-all per M4: unknown action from task-router.ps1 should fail
      # safely to dependency_check (the natural "we're done with tasks"
      # path) rather than raise `No matching route found`.
      - to: dependency_check

  # ── Coder agent ────────────────────────────────────────────────────────
  #
  # Implements a single task. Uses Opus 1M for large-context code generation.
  # Reads the task description, acceptance criteria, and codebase context,
  # then produces code changes committed to the PG branch.
  #
  # Invariants:
  #   Pre:  task_router.output.action == 'implement_task'; task_id is valid.
  #   Post: Code changes are committed to the PG branch for the task.
  - name: coder
    type: agent
    model: gpt-4.1
    description: Implement a single task with code changes committed to the PG branch
    tools:
      - twig
      - gh
      - filesystem
    prompt: |
      You are the implementation coder for the twig SDLC workflow.

      ## Your Mission

      Implement the task described below. Write clean, production-quality code
      that satisfies the acceptance criteria. Commit your changes to the current
      PG branch.

      ## Context

      - **Task ID:** {{ task_router.output.task_id }}
      - **Task title:** {{ task_router.output.task_title }}
      - **PG branch:** {{ workflow.input.branch_name }}
      - **Parent work item:** {{ workflow.input.work_item_id }}

      ## Instructions

      1. Read the full task description from ADO using `twig show {{ task_router.output.task_id }}`
      2. Understand the codebase context — read related files, understand patterns
      3. Implement the changes required by the task
      4. Write tests covering the new functionality
      5. Run the build and tests to verify correctness
      6. Commit and push your changes with a descriptive message including `AB#{{ task_router.output.task_id }}`

      ## Constraints

      - Follow existing code conventions and patterns
      - Do NOT modify files outside the scope of this task
      - Do NOT skip tests — every implementation must have test coverage
      - Commit messages must reference the ADO work item: `AB#{{ task_router.output.task_id }}`
      - Stage only the files you actually modified for this task. Use
        `git add <path1> <path2>` with explicit paths — never `git add -A`,
        `git add .`, or `git add --all`. The working tree may contain
        unrelated dirty files from concurrent human work or earlier
        workflow iterations; sweeping them in pollutes the commit, breaks
        AB# traceability, and creates phantom changes in PR review.

      {% if guidance_loader.output.coder is defined and guidance_loader.output.coder %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.coder }}
      {% endif %}
    routes:
      - to: task_reviewer

  # ── Task reviewer ──────────────────────────────────────────────────────
  #
  # Reviews the coder's implementation for correctness, code quality, and
  # alignment with the task requirements. Routes to task_completer if
  # approved, or back to coder if changes are requested.
  #
  # Invariants:
  #   Pre:  coder has committed changes to the PG branch for the task.
  #   Post: output.verdict is 'approved' or 'changes_requested'.
  - name: task_reviewer
    type: agent
    model: claude-sonnet-4.6
    description: Review task implementation for correctness and quality
    tools:
      - twig
      - filesystem
    output:
      # Schema mirrors this agent's JSON contract below. Required by M2:
      # routes read task_reviewer.output.verdict.
      verdict:
        type: string
        description: Review outcome — "approved" or "changes_requested"
      feedback:
        type: string
        description: Detailed review feedback
      issues:
        type: array
        description: List of specific issues if changes_requested (empty if approved)
        items:
          type: string
    prompt: |
      You are the task reviewer for the twig SDLC workflow.

      ## Your Mission

      Review the implementation of task {{ task_router.output.task_id }} for
      correctness, code quality, and alignment with the task requirements.

      ## Context

      - **Task ID:** {{ task_router.output.task_id }}
      - **Task title:** {{ task_router.output.task_title }}
      - **PG branch:** {{ workflow.input.branch_name }}

      ## Instructions

      1. Read the task description from ADO: `twig show {{ task_router.output.task_id }}`
      2. Inspect the latest commit on this PG branch — start with
         `git log --oneline -5` and `git diff HEAD~1` to see what the
         coder actually changed for this task.
      3. Read the modified source and test files in full as needed.
      4. Verify:
         - Requirements are met
         - Code quality is acceptable
         - Tests cover the implementation
         - No regressions introduced
      5. Return your verdict

      ## Output

      Return a JSON object:
      ```json
      {
        "verdict": "approved | changes_requested",
        "feedback": "Detailed review feedback",
        "issues": ["List of specific issues if changes_requested"]
      }
      ```

      ## Decision Criteria

      - **Approve** if the implementation is correct, well-tested, and meets requirements
      - **Request changes** only for substantive issues (bugs, missing requirements, no tests)
      - Do NOT request changes for style preferences or minor nits

      {% if guidance_loader.output.reviewer is defined and guidance_loader.output.reviewer %}
      ## Repo-Specific Guidance

      {{ guidance_loader.output.reviewer }}
      {% endif %}
    routes:
      - to: task_completer
        when: "{{ task_reviewer.output.verdict == 'approved' }}"
      - to: coder
        when: "{{ task_reviewer.output.verdict == 'changes_requested' }}"
      # Catch-all per M4: an unexpected verdict value (typo, schema drift)
      # routes back to coder for another iteration rather than raising
      # `No matching route found`.
      - to: coder

  # ── Task completer ─────────────────────────────────────────────────────
  #
  # Transitions the completed task to Done in ADO and adds a summary note.
  # Then routes back to task_router to pick up the next task, or proceeds
  # to dependency_check if no more tasks remain.
  #
  # Invariants:
  #   Pre:  task_reviewer.output.verdict == 'approved'.
  #   Post: Task is transitioned to Done in ADO; notes added.
  - name: task_completer
    type: script
    description: Transition completed task to its template's done state and route to next task
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        $taskId = {{ task_router.output.task_id }};
        twig set $taskId;
        twig note --text 'Task completed and approved by reviewer';
        $validate = polyphony validate --work-item $taskId --event implementation_complete | ConvertFrom-Json;
        if (-not $validate.is_valid) { throw "Cannot transition task $($taskId): $($validate.message)" };
        twig state $validate.target_state;
        @{ task_id = $taskId; completed = $true; target_state = $validate.target_state } | ConvertTo-Json
    routes:
      - to: task_router

  # ── Dependency check ───────────────────────────────────────────────────
  #
  # Checks ADO predecessor links to determine if the PG is blocked by
  # unresolved dependencies. Runs dependency-check.ps1 which queries ADO
  # for predecessor work items and their states. Items with no predecessor
  # links are routed directly to issue_reviewer (gate never fires).
  #
  # On re-entry (P3), this node re-runs and auto-clears blocks whose
  # predecessors have since reached a terminal state.
  #
  # Invariants:
  #   Pre:  All tasks in this PG are complete (task_router.output.action == 'all_tasks_done').
  #   Post: output.status is 'blocked' or 'not_blocked'; blocking_items list populated if blocked.
  - name: dependency_check
    type: script
    description: Check ADO predecessor links for blocking dependencies
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/dependency-check.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
    routes:
      - to: dependency_gate
        when: "{{ dependency_check.output.status == 'blocked' }}"
      - to: issue_reviewer
        when: "{{ dependency_check.output.status == 'not_blocked' }}"
      # Catch-all per M4: defensive fallback — if dependency-check.ps1
      # ever emits a status other than blocked/not_blocked, treat it as
      # the safer "blocked" path so a human resolves it via the gate.
      - to: dependency_gate

  # ── Dependency gate (human decision point) ─────────────────────────────
  #
  # Fires only when dependency_check detects unresolved predecessor links
  # on the parent work item. Items with no predecessor links bypass this
  # gate entirely (dependency_check returns not_blocked).
  #
  # Presents blocking items and three options (P6: genuine multi-option
  # decision; P13: Jinja2 Markdown template with table layout):
  #   - Wait:     Route back to dependency_check. On workflow resume,
  #               predecessors are re-checked automatically — if they
  #               completed in the interim, the block clears without
  #               user intervention (P3: re-entry by state).
  #   - Override: Proceed to issue review despite unresolved dependencies
  #               (user accepts risk of integration issues).
  #   - Reassign: End this PG. Tasks should be reassigned to another PG
  #               or tracked externally outside this workflow.
  #
  # Invariants:
  #   Pre:  dependency_check.output.status == 'blocked';
  #         dependency_check.output.blocking_items is non-empty.
  #   Post: User has chosen wait (re-check), override (proceed), or reassign (end PG).
  - name: dependency_gate
    type: human_gate
    prompt: |
      ## 🚫 Dependency Gate — PG {{ workflow.input.pg_number }}

      Work item **{{ workflow.input.work_item_id }}** has unresolved predecessor
      dependencies that may block PR submission.

      ### Blocking Items

      | # | Work Item | Title | State |
      |---|-----------|-------|-------|
      {% for item in dependency_check.output.blocking_items %}
      | {{ loop.index }} | `{{ item.id }}` | {{ item.title }} | {{ item.state }} |
      {% endfor %}

      ---

      **{{ dependency_check.output.blocking_items | length }}** predecessor(s) are
      not yet complete.

      > **Re-entry note:** Choosing **Wait** routes back to the dependency check.
      > If the workflow resumes later, predecessors are re-checked automatically —
      > any that completed in the interim will clear the block without user action.

      Choose an action:
      - **Wait** — re-check dependencies later (blockers may resolve on their own)
      - **Override** — proceed to issue review despite unresolved dependencies (user accepts risk)
      - **Reassign** — end this PG and track dependencies externally
    options:
      - label: "⏳ Wait"
        value: wait
        route: dependency_check
      - label: "⏩ Override"
        value: override
        route: issue_reviewer
      - label: "🔀 Reassign"
        value: reassign
        route: $end

  # ── Issue reviewer ─────────────────────────────────────────────────────
  #
  # Reviews the completed PG at the issue level. Checks that all tasks are
  # properly implemented, the overall solution is cohesive, and the PG is
  # ready for PR submission.
  #
  # Invariants:
  #   Pre:  All tasks complete; dependencies resolved (or overridden).
  #   Post: output.verdict is 'approved' or 'changes_requested'.
  - name: issue_reviewer
    type: agent
    model: gpt-4.1
    description: Review completed PG at the issue level for cohesion and completeness
    tools:
      - twig
      - filesystem
    output:
      # Schema mirrors this agent's JSON contract below. Required by M2:
      # routes read issue_reviewer.output.verdict.
      verdict:
        type: string
        description: Review outcome — "approved" or "changes_requested"
      feedback:
        type: string
        description: Detailed issue-level review feedback (also rendered in the user_acceptance human gate, so write it for a human reader)
      issues:
        type: array
        description: Specific issues if changes_requested (empty if approved)
        items:
          type: string
    prompt: |
      You are the issue-level reviewer for the twig SDLC workflow.

      ## Your Mission

      Review the completed PG {{ workflow.input.pg_number }} for work item
      {{ workflow.input.work_item_id }} at the issue level. Verify that the
      overall solution is cohesive and ready for PR submission.

      ## Context

      - **PG number:** {{ workflow.input.pg_number }}
      - **Parent work item:** {{ workflow.input.work_item_id }}
      - **PG branch:** {{ workflow.input.branch_name }}
      - **Tasks in this PG:** {{ workflow.input.work_item_ids | length }}
        ({{ workflow.input.work_item_ids | join(', ') }})

      ## Instructions

      1. Read the parent work item description: `twig show {{ workflow.input.work_item_id }}`
      2. Inspect the PG branch in full:
         - `git log --oneline {{ workflow.input.feature_branch }}..{{ workflow.input.branch_name }}`
           to see every commit added by this PG.
         - `git diff {{ workflow.input.feature_branch }}...{{ workflow.input.branch_name }} --stat`
           for an aggregate file/line summary.
         - Read the modified files in full as needed.
      3. Verify:
         - All acceptance criteria from the parent work item are met
         - Tasks work together cohesively
         - No integration issues between tasks
         - Test coverage is adequate at the integration level
      4. Return your verdict.

         The `feedback` field will be rendered to the human in the
         user_acceptance gate that follows — write a self-contained
         summary the user can read without re-running git. Cover:
         what changed, which files moved, what tests were added, and
         any remaining concerns.

      ## Output

      Return a JSON object:
      ```json
      {
        "verdict": "approved | changes_requested",
        "feedback": "Issue-level review feedback",
        "issues": ["List of specific issues if changes_requested"]
      }
      ```
    routes:
      - to: user_acceptance
        when: "{{ issue_reviewer.output.verdict == 'approved' }}"
      - to: task_router
        when: "{{ issue_reviewer.output.verdict == 'changes_requested' }}"
      # Catch-all per M4: unknown verdict (typo, schema drift) routes
      # back to task_router for another iteration rather than raising
      # `No matching route found`.
      - to: task_router

  # ── User acceptance gate ───────────────────────────────────────────────
  #
  # Optional human gate for user acceptance of the completed PG before PR
  # submission. Presents the issue-level summary and allows the user to
  # accept, request changes, or abort (P6, P13).
  #
  # Invariants:
  #   Pre:  issue_reviewer.output.verdict == 'approved'.
  #   Post: User has accepted (proceed to PR), requested changes (loop), or aborted.
  - name: user_acceptance
    type: human_gate
    prompt: |
      ## ✅ PG {{ workflow.input.pg_number }} — Ready for PR

      All tasks in PG {{ workflow.input.pg_number }} for work item
      **{{ workflow.input.work_item_id }}** have been implemented and reviewed.

      ### Tasks Completed: {{ workflow.input.work_item_ids | length }}

      {% for task_id in workflow.input.work_item_ids %}
      - `AB#{{ task_id }}`
      {% endfor %}

      ### Reviewer Summary

      {{ issue_reviewer.output.feedback }}

      ### Inspect the changes

      ```
      git log --oneline {{ workflow.input.feature_branch }}..{{ workflow.input.branch_name }}
      git diff {{ workflow.input.feature_branch }}...{{ workflow.input.branch_name }} --stat
      git diff {{ workflow.input.feature_branch }}...{{ workflow.input.branch_name }}
      ```

      ---

      Choose an action:
      - **Accept** — proceed to create the PG pull request
      - **Request Changes** — send back for additional work
      - **Abort** — cancel this PG
    options:
      - label: "✅ Accept"
        value: accepted
        route: pr_submit
      - label: "🔄 Request Changes"
        value: changes
        route: task_router
      - label: "🛑 Abort"
        value: abort
        route: $end

  # ── PR submit ──────────────────────────────────────────────────────────
  #
  # Creates the PG pull request targeting the feature branch. Uses an agent
  # to craft the PR title, description, and labels, then invokes `gh pr create`.
  #
  # Invariants:
  #   Pre:  User accepted the PG work (or pg_router action == submit_pr for re-entry).
  #   Post: PR is created; output.pr_number and output.pr_url are set.
  - name: pr_submit
    type: agent
    model: claude-sonnet-4.6
    description: Create the PG pull request targeting the feature branch
    tools:
      - twig
      - gh
    output:
      # Schema mirrors this agent's JSON contract below. Required by M2:
      # workflow-scope output reads pr_submit.output.pr_url and downstream
      # sub-workflows read pr_submit.output.pr_number via input_mapping.
      pr_number:
        type: number
        description: GitHub or ADO pull request number
      pr_url:
        type: string
        description: Full URL to the created PR
      title:
        type: string
        description: PR title
      description:
        type: string
        description: PR body
    prompt: |
      You are the PR creator for the twig SDLC workflow.

      ## Your Mission

      Create a pull request for PG {{ workflow.input.pg_number }} targeting
      the feature branch.

      ## Context

      - **PG number:** {{ workflow.input.pg_number }}
      - **PG branch:** {{ workflow.input.branch_name }}
      - **Target branch:** {{ workflow.input.feature_branch }}
      - **Work item:** {{ workflow.input.work_item_id }}

      ## Instructions

      1. Craft a descriptive PR title: `PG-{{ workflow.input.pg_number }}: <brief summary>`
      2. Write a PR description including:
         - Summary of all tasks completed
         - Files changed
         - Test coverage
         - Link to ADO work item: `AB#{{ workflow.input.work_item_id }}`
      3. Create the PR using `gh pr create`:
         - Base: `{{ workflow.input.feature_branch }}`
         - Head: `{{ workflow.input.branch_name }}`
      4. Return the PR number and URL

      ## Output

      Return a JSON object:
      ```json
      {
        "pr_number": 0,
        "pr_url": "",
        "title": "",
        "description": ""
      }
      ```
    routes:
      - to: pr_platform_router

  # ── PR platform router ────────────────────────────────────────────────
  #
  # Routes to the platform-specific PR lifecycle sub-workflow based on the
  # platform input. Driven exclusively by process-config.yaml's platform
  # field (FR8).
  #
  # Invariants:
  #   Pre:  pr_submit has created a PR; platform is 'github' or 'ado'.
  #   Post: Routes to github-pr.yaml or ado-pr.yaml sub-workflow.
  - name: pr_platform_router
    type: script
    description: Route to platform-specific PR lifecycle based on platform config
    command: pwsh
    args:
      - "-NoProfile"
      - "-Command"
      - >-
        @{ platform = '{{ workflow.input.platform }}' } | ConvertTo-Json
    routes:
      - to: pr_lifecycle_github
        when: "{{ pr_platform_router.output.platform == 'github' }}"
      - to: pr_lifecycle_ado
        when: "{{ pr_platform_router.output.platform == 'ado' }}"
      # Catch-all per M4: unknown platform value (only github/ado are
      # currently supported) fails safely to $end rather than raising
      # `No matching route found` mid-PR.
      - to: $end

  # ── GitHub PR lifecycle sub-workflow ───────────────────────────────────
  #
  # Invokes github-pr.yaml for the full GitHub PR lifecycle (review, fix,
  # merge). Passes the PR details and review policy.
  #
  # Invariants:
  #   Pre:  pr_platform_router.output.platform == 'github'; PR exists.
  #   Post: PR is reviewed, fixed (if needed), and merged.
  - name: pr_lifecycle_github
    type: workflow
    description: GitHub PR lifecycle — review, fix loop, merge
    workflow: ./github-pr.yaml
    input_mapping:
      pr_number: "{{ pr_submit.output.pr_number }}"
      branch_name: "{{ workflow.input.branch_name }}"
      target_branch: "{{ workflow.input.feature_branch }}"
      review_policy: "auto"
    routes:
      - to: scope_closer
        when: "{{ pr_lifecycle_github.output.merged == true }}"
      - to: $end
        when: "{{ pr_lifecycle_github.output.merged == false }}"
  #
  # Invokes ado-pr.yaml for the ADO PR lifecycle (stub with human gate).
  # Returns after the human has managed the PR manually.
  #
  # Invariants:
  #   Pre:  pr_platform_router.output.platform == 'ado'; PR exists.
  #   Post: PR is managed (manually) and result returned.
  - name: pr_lifecycle_ado
    type: workflow
    description: ADO PR lifecycle stub — human gate for manual PR management
    workflow: ./ado-pr.yaml
    input_mapping:
      pr_number: "{{ pr_submit.output.pr_number }}"
      branch_name: "{{ workflow.input.branch_name }}"
      target_branch: "{{ workflow.input.feature_branch }}"
      review_policy: "manual"
    routes:
      - to: scope_closer
        when: "{{ pr_lifecycle_ado.output.merged == true }}"
      - to: $end
        when: "{{ pr_lifecycle_ado.output.merged == false }}"

  # ── Scope closer ──────────────────────────────────────────────────────
  #
  # After the PR merges, transitions completed items in this PG to their
  # terminal state in ADO. Uses scope-closer.ps1 which validates each
  # item via polyphony before transitioning.
  #
  # Invariants:
  #   Pre:  PR has been merged (pr_lifecycle output.merged == true).
  #   Post: All PG items are transitioned to Done in ADO.
  - name: scope_closer
    type: script
    description: Transition completed PG items to Done in ADO after PR merge
    command: pwsh
    args:
      - "-NoProfile"
      - "-File"
      - "scripts/scope-closer.ps1"
      - "-WorkItemId"
      - "{{ workflow.input.work_item_id }}"
      - "-PgNumber"
      - "{{ workflow.input.pg_number }}"
    routes:
      - to: $end
